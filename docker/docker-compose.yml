version: "3.9"

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: kashif-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
      POST: 1
      EXEC: 0
      SYSTEM: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      TASKS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kashif-internal

  api:
    build:
      context: ../apps/api
    container_name: kashif-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    ports:
      - "8000:8000"
    volumes:
      - ${HOME}/kashif-storage:/storage/local
      - /mnt/kashif-nas:/storage/nas
    depends_on:
      - db
      - docker-socket-proxy
    networks:
      - kashif-internal

  db:
    image: postgres:16-alpine
    container_name: kashif-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kashif
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: kashif_cloud
    volumes:
      - kashif_db_data:/var/lib/postgresql/data
    networks:
      - kashif-internal

networks:
  kashif-internal:
    driver: bridge

volumes:
  kashif_db_data:
