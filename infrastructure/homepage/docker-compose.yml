services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.31.154:3001,localhost:3001

    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - cloud-net

networks:
  cloud-net:
    external: true
